; =========================================================
; MEDIAGTW TRUNK ROUTING - RO SERVER
; =========================================================

[to-mediagtw]
exten => 999,1,NoOp(TEST call from RO to NEW ASTERISK - Echo)
 same => n,Dial(SIP/mediagtw/999,60)
 same => n,Hangup()

exten => 600,1,NoOp(TEST call from RO to NEW ASTERISK - Playback)
 same => n,Dial(SIP/mediagtw/600,60)
 same => n,Hangup()

exten => _X.,1,NoOp(Sending generic call from RO to NEW ASTERISK EXTEN=${EXTEN})
 same => n,Dial(SIP/mediagtw/${EXTEN},60)
 same => n,Hangup()


; =========================================================
; MEDIAGTW -> RO OUTBOUND ROUTING BY CALLERID
; =========================================================

[from-mediagtw]

; =========================================================
; TEST - ECHO
; =========================================================
exten => 999,1,NoOp(TEST call from NEW ASTERISK to RO - Echo)
exten => 999,2,Answer()
exten => 999,3,Echo()
exten => 999,4,Hangup()

; =========================================================
; TEST - PLAYBACK
; =========================================================
exten => 600,1,NoOp(TEST call from NEW ASTERISK to RO - Playback)
exten => 600,2,Answer()
exten => 600,3,Playback(demo-congrats)
exten => 600,4,Hangup()

; =========================================================
; OUTBOUND CALLS FROM MEDIAGTW
; CallerID prichádza priamo z MediaGTW, napr. 364716410
; =========================================================
exten => _X.,1,NoOp(Call from MediaGTW to RO EXTEN=${EXTEN} CID_ALL=${CALLERID(all)} CID_NUM=${CALLERID(num)})
exten => _X.,2,Set(ORIG_OUTNUM=${EXTEN})
exten => _X.,3,Set(OUTNUM=${EXTEN})
exten => _X.,4,Set(ORIG_CID=${CALLERID(num)})
exten => _X.,5,Set(ROUTE_CID=${CALLERID(num)})

; =========================================================
; NORMALIZE OUTGOING NUMBER
; +421948519438 -> 00421948519438
; 421948519438  -> 00421948519438
; 00421948519438 zostane ako je
; =========================================================
exten => _X.,6,GotoIf($["${OUTNUM:0:1}" = "+"]?20)
exten => _X.,7,GotoIf($["${OUTNUM:0:2}" = "00"]?30)
exten => _X.,8,GotoIf($["${OUTNUM:0:2}" = "40"]?25)
exten => _X.,9,GotoIf($["${OUTNUM:0:3}" = "421"]?25)
exten => _X.,10,GotoIf($["${OUTNUM:0:3}" = "420"]?25)
exten => _X.,11,Goto(30)

; +421... -> 00421...
exten => _X.,20,Set(OUTNUM=00${OUTNUM:1})
exten => _X.,21,Goto(30)

; 40..., 421..., 420... -> 0040..., 00421..., 00420...
exten => _X.,25,Set(OUTNUM=00${OUTNUM})
exten => _X.,26,Goto(30)

exten => _X.,30,NoOp(Original number=${ORIG_OUTNUM} Normalized number=${OUTNUM})

; =========================================================
; NORMALIZE CALLERID FOR ROUTING
; +40364716410   -> 40364716410
; 0040364716410  -> 40364716410
; 40364716410    -> 40364716410
; 0364716410     -> 40364716410
; 364716410      -> 40364716410
; =========================================================
exten => _X.,31,GotoIf($["${ROUTE_CID:0:1}" = "+"]?40)
exten => _X.,32,GotoIf($["${ROUTE_CID:0:4}" = "0040"]?45)
exten => _X.,33,GotoIf($["${ROUTE_CID:0:2}" = "40"]?60)
exten => _X.,34,GotoIf($["${ROUTE_CID:0:1}" = "0"]?50)
exten => _X.,35,GotoIf($["${ROUTE_CID:0:1}" = "3"]?55)
exten => _X.,36,Goto(60)

exten => _X.,40,Set(ROUTE_CID=${ROUTE_CID:1})
exten => _X.,41,Goto(60)

exten => _X.,45,Set(ROUTE_CID=40${ROUTE_CID:4})
exten => _X.,46,Goto(60)

exten => _X.,50,Set(ROUTE_CID=40${ROUTE_CID:1})
exten => _X.,51,Goto(60)

exten => _X.,55,Set(ROUTE_CID=40${ROUTE_CID})
exten => _X.,56,Goto(60)

exten => _X.,60,NoOp(Original CID=${ORIG_CID} Normalized routing CID=${ROUTE_CID})

; =========================================================
; ROUTE BY CALLERID
; =========================================================

; =========================================================
; SPECIFIC REP ACCOUNT
; +40364716410 / 364716410 -> SIPrep_1_trunk = SIP/364716410
; Dolezite: toto musi byt pred vseobecnym rozsahom 403647164xx
; =========================================================
exten => _X.,61,GotoIf($["${ROUTE_CID}" = "40364716410"]?150)

; =========================================================
; DEFAULT DEBTOR RANGE
; +40364716400 - +40364716499 -> SIPdebtort_trunk = SIP/364716400
; =========================================================
exten => _X.,62,GotoIf($["${ROUTE_CID:0:9}" = "403647164"]?100)

; +40364710206 -> SIPeuro_trunk
exten => _X.,63,GotoIf($["${ROUTE_CID}" = "40364710206"]?200)

; +40364710205 -> SIPeurovoice_trunk
exten => _X.,64,GotoIf($["${ROUTE_CID}" = "40364710205"]?300)

; 377100075 / +40377100075 -> SIPeuro1_trunk
exten => _X.,65,GotoIf($["${ROUTE_CID}" = "40377100075"]?400)
exten => _X.,66,GotoIf($["${ROUTE_CID}" = "377100075"]?400)

; unknown CID fallback
exten => _X.,67,Goto(900)


; =========================================================
; ROUTE 100 - DEBTORT DEFAULT
; CID range: +40364716400 - +40364716499
; Trunk: SIP/364716400
; Pouzije sa pre ostatne cisla z rozsahu, ktore nemaju vlastny account
; =========================================================
exten => _X.,100,NoOp(ROUTE SELECTED: DEBTORT DEFAULT trunk=${SIPdebtort_trunk} ROUTE_CID=${ROUTE_CID} OUTNUM=${OUTNUM})
exten => _X.,101,Set(TRUNK_CID_LOCAL=364716400)
exten => _X.,102,Set(TRUNK_CID_E164=+40364716400)
exten => _X.,103,Set(CALLERID(num)=${TRUNK_CID_LOCAL})
exten => _X.,104,Set(CALLERID(name)=${TRUNK_CID_LOCAL})
exten => _X.,105,Set(CALLERID(all)="${TRUNK_CID_LOCAL}" <${TRUNK_CID_LOCAL}>)
exten => _X.,106,NoOp(Dialing via DEBTORT DEFAULT with CID=${CALLERID(all)} trunk=${SIPdebtort_trunk} OUTNUM=${OUTNUM})
exten => _X.,107,Dial(${SIPdebtort_trunk}/${OUTNUM}|60|tToR)
exten => _X.,108,NoOp(DEBTORT DEFAULT result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,109,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,110,Goto(990)


; =========================================================
; ROUTE 150 - REP 1
; CID: +40364716410 / 364716410
; Trunk: SIP/364716410
; =========================================================
exten => _X.,150,NoOp(ROUTE SELECTED: REP_1 trunk=${SIPrep_1_trunk} ROUTE_CID=${ROUTE_CID} OUTNUM=${OUTNUM})
exten => _X.,151,Set(TRUNK_CID_LOCAL=${ROUTE_CID:2})
exten => _X.,152,Set(TRUNK_CID_E164=+${ROUTE_CID})
exten => _X.,153,Set(CALLERID(num)=${TRUNK_CID_LOCAL})
exten => _X.,154,Set(CALLERID(name)=${TRUNK_CID_LOCAL})
exten => _X.,155,Set(CALLERID(all)="${TRUNK_CID_LOCAL}" <${TRUNK_CID_LOCAL}>)
exten => _X.,156,NoOp(Dialing via REP_1 with CID=${CALLERID(all)} trunk=${SIPrep_1_trunk} OUTNUM=${OUTNUM})
exten => _X.,157,Dial(${SIPrep_1_trunk}/${OUTNUM}|60|tToR)
exten => _X.,158,NoOp(REP_1 result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,159,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,160,Goto(990)


; =========================================================
; ROUTE 200 - EURO
; CID: +40364710206
; Trunk: SIP/dp_364710206
; =========================================================
exten => _X.,200,NoOp(ROUTE SELECTED: EURO trunk=${SIPeuro_trunk} ROUTE_CID=${ROUTE_CID} OUTNUM=${OUTNUM})
exten => _X.,201,Set(CALLERID(num)=${ROUTE_CID:2})
exten => _X.,202,NoOp(Dialing via EURO with CID=${CALLERID(num)} number=${OUTNUM})
exten => _X.,203,Dial(${SIPeuro_trunk}/${OUTNUM}|60|tToR)
exten => _X.,204,NoOp(EURO result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,205,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,206,Goto(990)


; =========================================================
; ROUTE 300 - EUROVOICE
; CID: +40364710205
; Trunk: SIP/dp_364710205
; =========================================================
exten => _X.,300,NoOp(ROUTE SELECTED: EUROVOICE trunk=${SIPeurovoice_trunk} ROUTE_CID=${ROUTE_CID} OUTNUM=${OUTNUM})
exten => _X.,301,Set(CALLERID(num)=${ROUTE_CID:2})
exten => _X.,302,NoOp(Dialing via EUROVOICE with CID=${CALLERID(num)} number=${OUTNUM})
exten => _X.,303,Dial(${SIPeurovoice_trunk}/${OUTNUM}|60|tToR)
exten => _X.,304,NoOp(EUROVOICE result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,305,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,306,Goto(990)


; =========================================================
; ROUTE 400 - EURO1
; CID: 377100075 / +40377100075
; Trunk: SIP/dp_377100075
; =========================================================
exten => _X.,400,NoOp(ROUTE SELECTED: EURO1 trunk=${SIPeuro1_trunk} ROUTE_CID=${ROUTE_CID} OUTNUM=${OUTNUM})
exten => _X.,401,Set(CALLERID(num)=377100075)
exten => _X.,402,NoOp(Dialing via EURO1 with CID=${CALLERID(num)} number=${OUTNUM})
exten => _X.,403,Dial(${SIPeuro1_trunk}/${OUTNUM}|60|tToR)
exten => _X.,404,NoOp(EURO1 result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,405,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,406,Goto(990)


; =========================================================
; ROUTE 900 - FALLBACK
; Unknown CID
; =========================================================
exten => _X.,900,NoOp(UNKNOWN CID=${ROUTE_CID}, using fallback EUROVOICE trunk=${SIPeurovoice_trunk} OUTNUM=${OUTNUM})
exten => _X.,901,Set(CALLERID(num)=364710205)
exten => _X.,902,Dial(${SIPeurovoice_trunk}/${OUTNUM}|60|tToR)
exten => _X.,903,NoOp(FALLBACK result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,904,GotoIf($["${DIALSTATUS}" = "ANSWER"]?1000)
exten => _X.,905,Goto(990)


; =========================================================
; FAILED
; =========================================================
exten => _X.,990,NoOp(Call failed. Final DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE} CID=${CALLERID(num)} OUTNUM=${OUTNUM})
exten => _X.,991,Playback(ss-noservice)
exten => _X.,992,Hangup()


; =========================================================
; ANSWERED
; =========================================================
exten => _X.,1000,NoOp(Call answered successfully. CID=${CALLERID(num)} OUTNUM=${OUTNUM})
exten => _X.,1001,Hangup()


[from-ro-inbound]

; =========================================================
; KONKRETNA DID -> NOVY MEDIAGTW -> INDEXUS
; =========================================================
exten => 364716410,1,NoOp(INDEXUS OVERRIDE TO MEDIAGTW RO DID=${EXTEN} FROM=${CALLERID(num)} UNIQUEID=${UNIQUEID})
exten => 364716410,2,Set(__DID_INB=${EXTEN})
exten => 364716410,3,Set(__DID_Date=${STRFTIME(${EPOCH},,%d-%m-%Y %H:%M:%S)})
exten => 364716410,4,Set(__CBC_SOURCE_TRUNK=RO)
;exten => 364716410,5,Dial(SIP/mediagtw/${EXTEN},60)
;exten => 364716410,5,Dial(SIP/mediagtw/${EXTEN},60,U(sub-delay))
;exten => 364716410,5,Dial(SIP/mediagtw/${EXTEN},60,b(ro-rtpfix^s^1))
exten => 364716410,5,Dial(SIP/mediagtw/${EXTEN},60,b(ro-bridge-fix^s^1))
 same => n,Return()
exten => 364716410,6,NoOp(MEDIAGTW Dial result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => 364716410,7,Hangup()

; =========================================================
; OSTATNE INBOUNDY
; =========================================================
exten => _X.,1,NoOp(RO STANDARD INBOUND ${CALLERID(num)})
exten => _X.,2,Set(DID_INB=${EXTEN})
exten => _X.,3,Set(DID_Date=${STRFTIME(${EPOCH},,%d-%m-%Y %H:%M:%S)})
exten => _X.,4,Goto(trunkinbound,${EXTEN},1)


[sub-delay]
exten => s,1,Wait(0.5)
exten => s,2,Return()

[ro-rtpfix]
exten => s,1,NoOp(RO RTP fix - sending re-INVITE via answer)
 same => n,Wait(0.5)
 same => n,SIPAddHeader(X-RTP-Fix: 1)
 same => n,Return()

[ro-bridge-fix]
exten => s,1,Wait(0.8)
 same => n,Return()
