[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
INDEXUS_ARI_APP=indexus-inbound

; =========================================================
; INTERNAL WEBRTC USERS
; =========================================================
[webrtc-indexus]

; -------------------------
; interné volania SK/CZ/RO
; -------------------------
exten => _2XXX,1,NoOp(Internal call to ${EXTEN} from ${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => _3XXX,1,NoOp(Internal call to ${EXTEN} from ${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => _4XXX,1,NoOp(Internal call to ${EXTEN} from ${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; -------------------------
; testy
; -------------------------
exten => 999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

exten => 600,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; -------------------------
; outbound s pluskom
; napr. +421948519438
; -------------------------
exten => _+X.,1,NoOp(WebRTC outbound PLUS caller=${CALLERID(num)} dest=${EXTEN})
 same => n,Set(OUTNUM=${EXTEN:1})
 same => n,Goto(indexus-outbound,${OUTNUM},1)

; -------------------------
; outbound bez pluska
; -------------------------
exten => _X.,1,NoOp(WebRTC outbound caller=${CALLERID(num)} dest=${EXTEN})
 same => n,Goto(indexus-outbound,${EXTEN},1)


; =========================================================
; INBOUND FROM SK LEGACY TRUNK
; =========================================================
[from-sk-trunk]
exten => _X.,1,NoOp(INBOUND from SK trunk DID=${EXTEN} CID=${CALLERID(all)})
 same => n,Set(__CBC_SOURCE_TRUNK=SK)
 same => n,Set(__CBC_SOURCE_IP=10.9.33.2)
 same => n,Set(__CBC_DID=${EXTEN})
 same => n,Set(__CBC_CALLER=${CALLERID(num)})
 same => n,Stasis(${INDEXUS_ARI_APP})
 same => n,Hangup()


; =========================================================
; INBOUND FROM RO LEGACY TRUNK
; =========================================================
[from-ro-trunk]
exten => _X.,1,NoOp(INBOUND from RO trunk DID=${EXTEN} CID=${CALLERID(all)})
 same => n,Set(__CBC_SOURCE_TRUNK=RO)
 same => n,Set(__CBC_SOURCE_IP=10.33.0.55)
 same => n,Set(__CBC_DID=${EXTEN})
 same => n,Set(__CBC_CALLER=${CALLERID(num)})
 same => n,Stasis(${INDEXUS_ARI_APP})
 same => n,Hangup()

; =========================================================

; RO DID 364716410 -> Indexus DID +40364716410

; =========================================================

exten => 364716410,1,NoOp(INBOUND from RO trunk DID=${EXTEN} CID=${CALLERID(all)} - normalize to +40364716410)

exten => 364716410,2,Set(__CBC_SOURCE_TRUNK=RO)

exten => 364716410,3,Set(__CBC_SOURCE_IP=10.33.0.55)

exten => 364716410,4,Set(__CBC_DID=40364716410)

exten => 364716410,5,Set(__CBC_CALLER=${CALLERID(num)})

exten => 364716410,6,NoOp(INDEXUS normalized DID=${CBC_DID} caller=${CBC_CALLER})

exten => 364716410,7,Stasis(indexus-inbound)

exten => 364716410,8,NoOp(Stasis ended DID=${CBC_DID} CALLER=${CBC_CALLER})

exten => 364716410,9,Hangup()

; =========================================================
; INBOUND FROM CZ LEGACY TRUNK
; pripravené do budúcna
; =========================================================
[from-cz-trunk]
exten => _X.,1,NoOp(INBOUND from CZ trunk DID=${EXTEN} CID=${CALLERID(all)})
 same => n,Set(__CBC_SOURCE_TRUNK=CZ)
 same => n,Set(__CBC_DID=${EXTEN})
 same => n,Set(__CBC_CALLER=${CALLERID(num)})
 same => n,Stasis(${INDEXUS_ARI_APP})
 same => n,Hangup()


; =========================================================
; OUTBOUND ROUTING FROM INDEXUS / WEBRTC
; ROUTING PODĽA KLAPKY VOLAJÚCEHO
; =========================================================
[indexus-outbound]
exten => _X.,1,NoOp(Indexus outbound caller=${CALLERID(num)} dest=${EXTEN})

 ; pôvodná klapka / caller
 same => n,Set(ORIG_EXT=${CALLERID(num)})

 ; callerid z AstDB
 same => n,Set(COLLAB_CID=${DB(callerid/${ORIG_EXT})})
 same => n,ExecIf($[${LEN(${COLLAB_CID})} > 0]?Set(CALLERID(num)=${COLLAB_CID}))

 ; campaign callerid z headera
 same => n,Set(CAMPAIGN_CID=${PJSIP_HEADER(read,X-Campaign-CallerID)})
 same => n,ExecIf($[${LEN(${CAMPAIGN_CID})} > 0]?Set(CALLERID(num)=${CAMPAIGN_CID}))

 same => n,NoOp(Outbound CID: ext=${ORIG_EXT} collab=${COLLAB_CID} campaign=${CAMPAIGN_CID} final=${CALLERID(num)})

 ; ---------------------------------------------------------
 ; HLAVNÁ LOGIKA: ROUTING PODĽA RANGE KLAPKY
 ; 2XXX = SK
 ; 3XXX = CZ
 ; 4XXX = RO
 ; ---------------------------------------------------------
 same => n,GotoIf($["${ORIG_EXT:0:1}"="2"]?route-sk,${EXTEN},1)
 same => n,GotoIf($["${ORIG_EXT:0:1}"="3"]?route-cz,${EXTEN},1)
 same => n,GotoIf($["${ORIG_EXT:0:1}"="4"]?route-ro,${EXTEN},1)

 ; ---------------------------------------------------------
 ; FALLBACK: keď caller extension nesedí, rozhodni podľa prefixu
 ; ---------------------------------------------------------
 same => n,NoOp(No origin-based route matched for ext=${ORIG_EXT}, trying prefix fallback...)
 same => n,GotoIf($["${EXTEN:0:3}"="420"]?route-cz,${EXTEN},1)
 same => n,GotoIf($["${EXTEN:0:2}"="36"]?route-hu,${EXTEN},1)
 same => n,GotoIf($["${EXTEN:0:2}"="40"]?route-ro,${EXTEN},1)
 same => n,GotoIf($["${EXTEN:0:3}"="421"]?route-sk,${EXTEN},1)

 same => n,NoOp(No outbound route matched for dest=${EXTEN} ext=${ORIG_EXT})
 same => n,Playback(ss-noservice)
 same => n,Hangup()


; =========================================================
; ROUTE SK
; =========================================================
[route-sk]
exten => _X.,1,NoOp(Route via SK legacy server caller=${CALLERID(num)} orig_ext=${ORIG_EXT} dest=${EXTEN})
 same => n,Set(OUTNUM=${EXTEN})

 ; ak je cislo v tvare 421xxxxxxxxx, zmeň na 0xxxxxxxxx
 same => n,ExecIf($["${OUTNUM:0:3}"="421"]?Set(OUTNUM=0${OUTNUM:3}))

 same => n,NoOp(Normalized SK outbound number=${OUTNUM})

 ; Preposlať campaign CID na SK server cez SIP header
 same => n,ExecIf($[${LEN(${CAMPAIGN_CID})} > 0]?Set(PJSIP_HEADER(add,X-Campaign-CallerID)=${CAMPAIGN_CID}))

 same => n,Dial(PJSIP/${OUTNUM}@trunk-sk-endpoint,60)
 same => n,Hangup()


; =========================================================
; ROUTE CZ
; ak máš CZ trunk, daj trunk-cz-endpoint
; ak ešte nemáš, nechaj trunk-sk-endpoint
; =========================================================
[route-cz]
exten => _X.,1,NoOp(Route CZ caller=${CALLERID(num)} orig_ext=${ORIG_EXT} dest=${EXTEN})
 same => n,Set(OUTNUM=${EXTEN})

 ; voliteľná normalizácia pre CZ môže zostať bez zmeny
 ; same => n,ExecIf($["${OUTNUM:0:3}"="420"]?Set(OUTNUM=${OUTNUM}))

 same => n,ExecIf($[${LEN(${CAMPAIGN_CID})} > 0]?Set(PJSIP_HEADER(add,X-Campaign-CallerID)=${CAMPAIGN_CID}))

 ; Ak máš CZ trunk:
 ; same => n,Dial(PJSIP/${OUTNUM}@trunk-cz-endpoint,60)

 ; Zatiaľ cez SK legacy server:
 same => n,Dial(PJSIP/${OUTNUM}@trunk-sk-endpoint,60)
 same => n,Hangup()


; =========================================================
; ROUTE HU
; fallback route podla prefixu 36
; ak chceš neskôr HU klapky, pridaj napr. 5XXX a branch vyššie
; =========================================================
[route-hu]
exten => _X.,1,NoOp(Route HU caller=${CALLERID(num)} orig_ext=${ORIG_EXT} dest=${EXTEN})
 same => n,Set(OUTNUM=${EXTEN})
 same => n,ExecIf($[${LEN(${CAMPAIGN_CID})} > 0]?Set(PJSIP_HEADER(add,X-Campaign-CallerID)=${CAMPAIGN_CID}))

 ; Ak máš HU trunk:
 ; same => n,Dial(PJSIP/${OUTNUM}@trunk-hu-endpoint,60)

 ; Zatiaľ cez SK legacy server:
 same => n,Dial(PJSIP/${OUTNUM}@trunk-sk-endpoint,60)
 same => n,Hangup()


; =========================================================
; ROUTE RO
; =========================================================

[route-ro]

exten => _X.,1,NoOp(Route via RO legacy server caller=${CALLERID(num)} orig_ext=${ORIG_EXT} dest=${EXTEN})
exten => _X.,2,Set(OUTNUM=${EXTEN})
exten => _X.,3,ExecIf($["${CAMPAIGN_CID}" != ""]?Set(PJSIP_HEADER(add,X-Campaign-CallerID)=${CAMPAIGN_CID}))
exten => _X.,4,Dial(PJSIP/${OUTNUM}@trunk-ro-endpoint,60)
exten => _X.,5,NoOp(RO trunk result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => _X.,6,Hangup()


; =========================================================
; TEST CONTEXTS
; =========================================================
[test-mediagtw]
exten => 999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

exten => 600,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; =========================================================
; FROM-INTERNAL — generic (fallback, routing podľa prefixu)
; =========================================================
[from-internal]
exten => _+X.,1,NoOp(from-internal generic +prefix forward to ${EXTEN})
 same => n,Set(OUTNUM=${EXTEN:1})
 same => n,ExecIf($[${LEN(${CBC_CALLER})} > 0]?Set(CALLERID(num)=${CBC_CALLER}))
 same => n,ExecIf($[${LEN(${CBC_CALLER})} > 0]?Set(CALLERID(name)=${CBC_CALLER}))
 same => n,ExecIf($[${LEN(${INDEXUS_REC_NAME})} > 0]?MixMonitor(/var/spool/asterisk/monitor/${INDEXUS_REC_NAME}.wav,v(1)V(1)))
 same => n,Goto(indexus-outbound,${OUTNUM},1)

exten => _X.,1,NoOp(from-internal generic forward to ${EXTEN})
 same => n,ExecIf($[${LEN(${CBC_CALLER})} > 0]?Set(CALLERID(num)=${CBC_CALLER}))
 same => n,ExecIf($[${LEN(${CBC_CALLER})} > 0]?Set(CALLERID(name)=${CBC_CALLER}))
 same => n,ExecIf($[${LEN(${INDEXUS_REC_NAME})} > 0]?MixMonitor(/var/spool/asterisk/monitor/${INDEXUS_REC_NAME}.wav,v(1)V(1)))
 same => n,Goto(indexus-outbound,${EXTEN},1)


