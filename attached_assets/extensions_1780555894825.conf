; =========================================================
; INTERNAL INDEXUS WEBRTC EXTENSIONS
; Used by ARI / Indexus to ring logged-in webphone users
; =========================================================

[from-internal-indexus]

; Agent / WebRTC extension 4000
exten => 4000,1,NoOp(INDEXUS INTERNAL CALL TO WEBRTC EXTENSION 4000 FROM=${CALLERID(all)} DID=${CBC_DID} CALLER=${CBC_CALLER})
exten => 4000,2,Dial(PJSIP/4000,60)
exten => 4000,3,NoOp(INDEXUS EXT 4000 Dial result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => 4000,4,Hangup()

; Agent / WebRTC extension 2001
exten => 2001,1,NoOp(INDEXUS INTERNAL CALL TO WEBRTC EXTENSION 2001 FROM=${CALLERID(all)} DID=${CBC_DID} CALLER=${CBC_CALLER})
exten => 2001,2,Dial(PJSIP/2001,60)
exten => 2001,3,NoOp(INDEXUS EXT 2001 Dial result DIALSTATUS=${DIALSTATUS} HANGUPCAUSE=${HANGUPCAUSE})
exten => 2001,4,Hangup()

; Generic WebRTC extensions 2XXX / 3XXX / 4XXX
exten => _2XXX,1,NoOp(INDEXUS INTERNAL CALL TO WEBRTC EXTENSION ${EXTEN} FROM=${CALLERID(all)} DID=${CBC_DID} CALLER=${CBC_CALLER})
exten => _2XXX,2,Dial(PJSIP/${EXTEN},60)
